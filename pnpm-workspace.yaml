# Список папок, которые pnpm считает отдельными проектами монорепо.
# Звёздочка = "любая папка внутри".
packages:
  - "apps/host"
  - "apps/patterns/*"
  - "packages/*"

# Пакеты, которым разрешено выполнять свои install-скрипты
# (esbuild — нативный движок внутри Vite, ему это нужно).
allowBuilds:
  esbuild: true
